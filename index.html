<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beatles - Game Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description"
        content="Identify the Beatles album from a 4-second song snippet. Test your Fab Four knowledge!">
</head>

<body>
    <div class="glass-container">
        <header>
            <h1><span class="accent">Beatlemania</span></h1>
            <div class="mode-selector">
                <button id="mode-album" class="mode-btn active">Album Sorter</button>
                <button id="mode-writer" class="mode-btn">Who Wrote It?</button>
                <button id="mode-timeline" class="mode-btn">Timeline</button>
            </div>
            <div class="score-board">
                <span id="highscore">High: 0</span>
                <span id="score">Score: 0</span>
                <span id="round">1/10</span>
            </div>
        </header>

        <main>
            <div id="game-workspace">
                <div class="audio-controls" id="audio-controls">
                    <button id="play-btn" class="main-btn">
                        <span id="play-btn-content">
                            <span class="material-symbols-outlined">play_arrow</span>
                            <span id="play-btn-text">Play Snippet</span>
                        </span>
                        <div class="visualizer hidden">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                    </button>
                </div>

                <div id="feedback" class="feedback"></div>

                <div id="album-grid" class="grid-container album-grid"></div>
                <div id="author-grid" class="grid-container author-grid hidden"></div>
                
                <div id="timeline-container" class="timeline-container hidden">
                    <div id="event-pool" class="event-pool"></div>
                    <div class="timeline-track">
                        <div id="timeline-slots" class="timeline-slots"></div>
                    </div>
                    <button id="submit-timeline" class="main-btn hidden">Check Order</button>
                </div>
            </div>
        </main>

        <footer>
            <!-- Interactive elements injected via JS -->
        </footer>
    </div>

    <script src="events.js"></script>
    <script src="main.js"></script>
</body>

</html>
