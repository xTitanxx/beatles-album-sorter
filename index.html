<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beatles - Game Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <meta name="description"
        content="Identify the Beatles album from a 4-second song snippet. Test your Fab Four knowledge!">
</head>

<body>
    <div class="glass-container">
        <header>
            <h1>The <span class="accent">Beatles</span></h1>
            <div class="score-board">
                <span id="highscore">Highscore: 0</span>
                <span id="score">Score: 0</span>
                <span id="round">Round: 1/10</span>
            </div>
        </header>

        <main>
            <div class="mode-selector">
                <button id="mode-album" class="mode-btn active">Album Sorter</button>
                <button id="mode-writer" class="mode-btn">Who Wrote It?</button>
            </div>

            <div class="audio-controls">
                <div class="visualizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <button id="play-btn" class="main-btn">
                    <div class="play-icon"></div>
                    <span id="play-btn-text">Play Snippet (4s)</span>
                </button>
            </div>

            <div id="feedback" class="feedback"></div>

            <div id="album-grid" class="grid-container album-grid"></div>
            <div id="author-grid" class="grid-container author-grid hidden"></div>
        </main>

        <footer>
            <!-- Next button merged into play-btn -->
        </footer>
    </div>

    <script src="main.js"></script>
</body>

</html>
